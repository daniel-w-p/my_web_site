{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}ITechMind{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-body">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">
        ITechMind
      </a>

      <!-- Hamburger / collapse trigger -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#mainNavbar"
              aria-controls="mainNavbar"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav links -->
      <div class="collapse navbar-collapse" id="mainNavbar">

        <!-- Left links -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="#about">{% trans "O mnie" %}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#services">{% trans "Usługi" %}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#portfolio">{% trans "Portfolio" %}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#contact">{% trans "Kontakt" %}</a>
          </li>
        </ul>

        <!-- Right controls (Language + Theme) -->
        <ul class="navbar-nav ms-auto align-items-center">

              <!-- Language flags -->
              <li class="nav-item mx-2 d-flex align-items-center">
                  <form action="{% url 'set_language' %}" method="post" class="d-flex align-items-center">
                    {% csrf_token %}

                    <!-- FLAGA PL -->
                    <button type="submit" name="language" value="pl" class="btn btn-link p-0 me-2">
                      <span id="flag-pl" class="language-flag flag-icon fi fi-pl fis"></span>
                    </button>

                    <!-- FLAGA EN -->
                    <button type="submit" name="language" value="en" class="btn btn-link p-0">
                      <span id="flag-en" class="language-flag flag-icon fi fi-gb fis"></span>
                    </button>
                  </form>
              </li>

              <!-- Theme switcher -->
              <li class="nav-item ms-3">
                <button id="theme-toggle" class="btn btn-link p-0" aria-label="Toggle theme">
                  <i id="theme-icon" class="bi bi-moon-stars-fill" style="font-size: 1.4rem;"></i>
                </button>
              </li>

        </ul>

      </div>
    </div>
  </nav>
  <!-- End Navbar -->


  <!-- Main content -->
  <main class="container my-5">
    {% block content %}{% endblock %}
  </main>



  <!-- Footer -->
  <footer class="text-center py-4">
    <div class="container">
      <span>&copy; {% now "Y" %} ITechMind</span>
    </div>
  </footer>
  <!-- End Footer -->


  <!-- Bootstrap JS Bundle (Popper + JS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
